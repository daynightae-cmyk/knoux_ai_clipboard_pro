appId: store.knoux.ai.clipboard.pro
productName: Knoux AI Clipboard Pro
copyright: "Copyright © 2026 KNOUX — Eng. Sadek Elgazar"

# Build Settings
directories:
  output: release
  buildResources: assets

# ASAR: Disabled - causing issues with app-builder icon processing
asar: false
asarUnpack: []

# Compression levels: 'store' (fastest), 'normal', 'maximum' (smallest file)
compression: normal

# Files to include in the final package
files:
  - from: "."
    filter:
      - "electron.js"
      - "main.js"
      - "dist/**/*"
      - "build/**/*"
      - "package.json"
      - "node_modules/**/*"
      - "!node_modules/.cache"
      - "!**/*.ts"
      - "!**/*.tsx"
      - "!**/*.map"
      - "!tests/"
      - "!src/"

# Windows Configuration
win:
  icon: "assets/icons/icon.ico"
  target:
    - portable
    - nsis
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: false

# Windows Installer (NSIS) Details
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  uninstallDisplayName: "Knoux AI Clipboard Pro (Uninstall)"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Knoux AI Clipboard Pro"
  installerIcon: "assets/icons/icon.ico"
  uninstallerIcon: "assets/icons/icon.ico"
  installerHeaderIcon: "assets/icons/icon.ico"
  runAfterFinish: true

# macOS Configuration
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false

# Linux Configuration
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  description: "AI-powered clipboard manager by KNOUX"
  synopsis: "Productivity Tool"
  maintainer: "Eng. Sadek Elgazar (Knoux) <knuux7@gmail.com>"

# Auto Update Configuration
publish:
  provider: github
  owner: KnouxOPS
  repo: knoux-ai-clipboard-pro
  releaseType: release
