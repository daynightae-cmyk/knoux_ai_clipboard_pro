


name: KNOUX Windows EXE Build







on:



  push:



    branches:



      - main



      - rescue/production-readiness



  pull_request:



    branches:



      - main



  workflow_dispatch:







permissions:



  contents: read



  actions: read







jobs:



  build-windows:



    name: Build Windows EXE



    runs-on: windows-latest



    timeout-minutes: 60







    steps:



      - name: Checkout repository



        uses: actions/checkout@v4







      - name: Setup Node.js



        uses: actions/setup-node@v4



        with:



          node-version: "20"



          cache: "npm"







      - name: Show environment



        shell: pwsh



        run: |



          node --version



          npm --version



          git --version







      - name: Install dependencies



        shell: pwsh



        run: npm install --legacy-peer-deps







      - name: Run production doctor



        shell: pwsh



        run: npm run doctor







      - name: Build renderer and main process



        shell: pwsh



        run: npm run build







      - name: Build Windows package



        shell: pwsh



        run: npm run dist







      - name: Upload Windows build artifact



        uses: actions/upload-artifact@v4



        if: always()



        with:



          name: knoux-ai-clipboard-pro-windows



          if-no-files-found: warn



          path: |



            release/**



            dist/**



            build/**



            *.exe



            *.msi



            *.blockmap



